version: "3.9"

services:
  vistaar-ui-service:
    build:
      context: .
      dockerfile: DOCKERFILE
      args:
        # Use same-origin /api behind Nginx or proxy to avoid CORS.
        # Leave base empty so frontend code calls `/api/...` directly.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_API_KEY: ${VITE_API_KEY:-}
        VITE_TELEMETRY_URL: ${VITE_TELEMETRY_URL:-/observability-service}
        VITE_OSS_TRANSLATE_SESSION_PERCENT: ${VITE_OSS_TRANSLATE_SESSION_PERCENT:-10}
        MODE: ${MODE:-production}
    image: vistaar-ui-service
    ports:
      - "8001:8081"
    environment:
      - NODE_ENV=production
    restart: always
